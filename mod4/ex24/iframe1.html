<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos de iframe</title>
    <style>
        iframe{
            width: 400px;
            height: 400px;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <h1>Testando o uso de iframe</h1>
    <p>Acessando o site do 
        <iframe src="https://www.cursoemvideo.com" frameborder="0" scolling="no"> <!-- esse comando nao funciona no google-->
            <a href="https://www.cursoemvideo.com" target="_blank">CursoemVideo</a>
        </iframe>
        para aprender a programar.</p>
        <p>
            O repositório do guanabara
            <iframe src="https://gustavoguanabara.github.io" frameborder="0"></iframe>
            é foda.
        </p>
        <!-- tamanho padrão do iframe = 300x150px -->
</body>
</html>
