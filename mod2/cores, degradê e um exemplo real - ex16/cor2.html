<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
</head>
<body>
    <h1>Testando gradientes</h1>
    <style>
        /*configurações globais das CSS*/
        * {
            height: 100%;
        }
        body{
            background-image: linear-gradient(to bottom, #BF369B, #724EBF, #F2A663, #F2845C, #F25252);
            background-attachment: fixed;
        }
    </style>
</body>
</html>
