<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixas</title>
    <style>
        h1{
            /*para transformar elementos box-level em elementos inline-level, basta colocar: 
            display: inline*/
            background-color: brown;
            height: 300px;
            width: 300px;

            /*border-width: 10px;
            border-style: solid;
            border-color: darkgoldenrod;*/
            /*essa é a forma mais longa de se fazer*/
            border: 10px solid darkgoldenrod;

            /*padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;*/
            /*essa é a forma mais longa de se fazer*/
            /*se as 4 medidas forem iguais, basta escrever uma vez só*/
            /*se quiser colocar só dois valores, o primeiro vai valer pra cima e pra baixo e o segundo vai valer pra direita e pra esquerda.*/
            padding: 10px;

            /*margin-top: 20px;
            margin-right: 20px;
            margin-bottom: 40px;
            margin-left: 20px;*/
            /*essa é a forma mais longa de se fazer*/
            margin: 20px 20px 40px 20px;

            /*outline-width: 5px;
            outline-style: dashed;
            outline-color: yellow;*/
            /*essa é a forma mais longa de se fazer*/
            outline: 5px dashed yellow

        }
        a{
            /*para transformar elementos inline-level em elementos box-level, basta colocar: 
            display: block*/
            border-width: 10px;
            border-style: solid;
            border-color: blue;
            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona.</p>

</body>
</html>
